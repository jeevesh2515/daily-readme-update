name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v1.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  build-python:
    name: Build and verify Python distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Install release tooling
        run: python -m pip install --upgrade build twine
      - name: Verify source
        run: |
          python -m unittest discover -v
          python -m readme_sync --check
      - name: Build distributions
        run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/readme-guardian
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-npm:
    name: Publish to npm
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/readme-guardian
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.10"
      - name: Build the bundled Python wheel
        run: |
          python -m pip install --upgrade build
          python -m build
          cp dist/readme_guardian-*-py3-none-any.whl npm/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Validate npm package contents
        run: npm pack --dry-run --json
        working-directory: npm
      - name: Publish package with npm Trusted Publishing
        run: npm publish --access public
        working-directory: npm
        env:
          # Optional bootstrap fallback. Once npm Trusted Publishing is configured,
          # remove this protected environment secret and use OIDC alone.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
