name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish, for example v1.1.2
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release-state:
    name: Check registry state
    runs-on: ubuntu-latest
    outputs:
      npm_exists: ${{ steps.versions.outputs.npm_exists }}
      pypi_exists: ${{ steps.versions.outputs.pypi_exists }}
      version: ${{ steps.versions.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Check published versions
        id: versions
        shell: bash
        run: |
          version="$(node -p "require('./npm/package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if npm view "readme-guardian@$version" version --json 2>/dev/null | tr -d '"' | grep -qx "$version"; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
            echo "npm already has readme-guardian@$version"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if python3 - "$version" <<'PY'
          import json
          import sys
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          version = sys.argv[1]
          try:
              with urlopen(f"https://pypi.org/pypi/readme-guardian/{version}/json", timeout=15) as response:
                  published = json.load(response)["info"]["version"]
          except (HTTPError, URLError):
              raise SystemExit(1)
          raise SystemExit(0 if published == version else 1)
          PY
          then
            echo "pypi_exists=true" >> "$GITHUB_OUTPUT"
            echo "PyPI already has readme-guardian@$version"
          else
            echo "pypi_exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-python:
    name: Build and verify Python distributions
    needs: release-state
    if: ${{ needs.release-state.outputs.npm_exists != 'true' || needs.release-state.outputs.pypi_exists != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - name: Install release tooling
        run: python -m pip install --upgrade build twine
      - name: Verify source
        run: |
          python -m unittest discover -v
          python -m readme_sync --check
      - name: Build distributions
        run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    # Keep registry versions aligned: do not publish Python when npm fails.
    needs: [release-state, build-python, publish-npm]
    if: >-
      ${{
        always() &&
        needs.build-python.result == 'success' &&
        needs.release-state.outputs.pypi_exists != 'true' &&
        (needs.publish-npm.result == 'success' || needs.release-state.outputs.npm_exists == 'true')
      }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/readme-guardian
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

  publish-npm:
    name: Publish to npm
    needs: [release-state, build-python]
    if: ${{ always() && needs.build-python.result == 'success' && needs.release-state.outputs.npm_exists != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/readme-guardian
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"
      - name: Build the bundled Python wheel
        run: |
          python -m pip install --upgrade build
          python -m build
          cp dist/readme_guardian-*-py3-none-any.whl npm/
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Validate npm package contents
        run: npm pack --dry-run --json
        working-directory: npm
      - name: Publish package with npm Trusted Publishing
        run: npm publish --access public
        working-directory: npm
        env:
          # Optional bootstrap fallback. Once npm Trusted Publishing is configured,
          # remove this protected environment secret and use OIDC alone.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
